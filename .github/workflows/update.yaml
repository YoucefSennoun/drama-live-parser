name: Update IPTV Playlist

on:
  schedule:
    # Runs every 6 hours (At minute 0 past every 6th hour)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to run it manually via a button on GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Parser Script
      run: python parsing.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add iptv.m3u
        git commit -m "Automated Playlist Update" || exit 0
        git push